name: Scrape, Build & Deploy

on:
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:
    inputs:
      president:
        description: "President slug to scrape (default: all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - trump-2
          - biden-1
          - trump-1
          - obama
          - bush-jr

  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Create data directory
        run: mkdir -p data

      - name: Run scraper
        env:
          PARDONNED_DB: ./data/pardonned.db
        run: |
          echo "Scraping pardons for all presidents"
          pnpm tsx src/scraper/scrape.ts

      - name: Verify database
        run: |
          if [ ! -f data/pardonned.db ]; then
            echo "::error::Database file was not created"
            exit 1
          fi
          echo "Database size: $(du -h data/pardonned.db | cut -f1)"

      - name: Build site
        env:
          PARDONNED_DB: ./data/pardonned.db
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=pardonned --commit-dirty=true
